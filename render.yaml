databases:
  - name: contest-db
    databaseName: contest
    user: contest
    plan: free

services:
  - type: web
    name: contest-api
    env: node
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contest-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: contest-ui
    env: static
    buildCommand: cd ui && npm install && npm run build
    staticPublishPath: ui/dist
    envVars:
      - key: VITE_API_URL
        sync: false
